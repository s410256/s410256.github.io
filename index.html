<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多因子辨識系統後台</title>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; text-align: center; background: #1a1a2e; color: white; padding-top: 50px; }
        .container { background: #16213e; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border: 1px solid #0f3460; }
        h1 { color: #e94560; margin-bottom: 30px; }
        .light { width: 45px; height: 45px; border-radius: 50%; display: inline-block; background: #533440; margin: 8px; transition: 0.4s; border: 2px solid #1a1a2e; }
       
        .active { background: #00d2ff; box-shadow: 0 0 20px #00d2ff, 0 0 40px #00d2ff; border-color: #fff; }
        #status { font-size: 1.5em; font-weight: bold; margin: 20px 0; color: #00d2ff; }
        #msg { font-style: italic; color: #95a5a6; background: #0f3460; padding: 10px; border-radius: 10px; min-width: 200px; display: inline-block; }
    </style>
</head>
<body>

    <div class="container">
        <h1>多因子辨識系統後台</h1>
        <div id="status">連線中...</div>
        <div id="lights">
            <div id="L1" class="list-light light"></div>
            <div id="L2" class="list-light light"></div>
            <div id="L3" class="list-light light"></div>
            <div id="L4" class="list-light light"></div>
            <div id="L5" class="list-light light"></div>
            <div id="L6" class="list-light light"></div>
        </div>
        <p>系統訊息：</p>
        <div id="msg">等待數據傳輸...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
      
        const firebaseConfig = {
            apiKey: "AIzaSyC42NK-qtUvnnsjMAhm2CrDAXl1N-b_vAM",
            authDomain: "project-4077090510236768798.firebaseapp.com",
            databaseURL: "https://project-4077090510236768798-default-rtdb.firebaseio.com",
            projectId: "project-4077090510236768798",
            storageBucket: "project-4077090510236768798.firebasestorage.app",
            messagingSenderId: "300320154462",
            appId: "1:300320154462:web:2e8f58d308fd183098a5cf"
        };

        // 初始化
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 監聽解鎖層級
        db.ref('current_layer').on('value', (snapshot) => {
            const layer = snapshot.val();
            document.getElementById('status').innerText = "驗證進度：第 " + layer + " 層";
            
            for(let i = 1; i <= 6; i++) {
                const el = document.getElementById('L' + i);
                if(layer > 0 && i <= layer) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            }
        });

        // 監聽系統訊息
        db.ref('status_msg').on('value', (snapshot) => {
            const rawMsg = snapshot.val();
            const cleanMsg = rawMsg.replace(/\"/g, ""); 
            document.getElementById('msg').innerText = cleanMsg;
        });
    </script>
</body>
</html>
